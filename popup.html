<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stackblock</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 14px 16px;
        min-width: 240px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        opacity: 0.75;
      }
      label.toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }
      input[type="checkbox"] {
        width: 36px;
        height: 20px;
        appearance: none;
        background: #c8c8c8;
        border-radius: 999px;
        position: relative;
        cursor: pointer;
        transition: background 0.15s ease;
        margin: 0;
      }
      input[type="checkbox"]::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s ease;
      }
      input[type="checkbox"]:checked {
        background: #ff6719;
      }
      input[type="checkbox"]:checked::after {
        transform: translateX(16px);
      }
    </style>
  </head>
  <body>
    <h1>Stackblock</h1>
    <p>Hides the Substack home feed and recommendation widgets.</p>
    <label class="toggle">
      <span>Block enabled</span>
      <input id="toggle" type="checkbox" />
    </label>
    <script src="popup.js"></script>
  </body>
</html>
